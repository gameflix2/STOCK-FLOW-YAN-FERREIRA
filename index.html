<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — Controle de Estoque</title>
<style>
  
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --neon:#00f5ff;--neon2:#bf00ff;--neon3:#00ff88;--neon4:#ff6b35;
    --glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);
    --border-glass:rgba(255,255,255,0.12);--border-neon:rgba(0,245,255,0.4);
    --bg:#050510;--bg2:#0a0a1e;--bg3:#0d0d2b;
    --text:#e8eeff;--text2:#8892b0;--text3:#ccd6f6
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(0,245,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(191,0,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 50% 80%,rgba(0,255,136,0.04) 0%,transparent 60%)
  }
  .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:float linear infinite}
  @keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) translateX(calc(var(--dx)*100px));opacity:0}}
  header{
    position:relative;z-index:10;padding:20px 32px;
    display:flex;align-items:center;justify-content:space-between;
    background:var(--glass);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border-glass);
    box-shadow:0 0 40px rgba(0,245,255,0.08),0 2px 0 var(--border-neon)
  }
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,rgba(0,245,255,0.2),rgba(191,0,255,0.2));
    border:1px solid var(--border-neon);
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 0 20px rgba(0,245,255,0.3),inset 0 0 15px rgba(0,245,255,0.05)
  }
  .logo-text{font-size:22px;font-weight:700;letter-spacing:2px;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:11px;color:var(--text2);letter-spacing:1px}
  .header-actions{display:flex;gap:12px;align-items:center}
  .badge{
    padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;
    background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.3);
    color:var(--neon);box-shadow:0 0 12px rgba(0,245,255,0.15);letter-spacing:1px
  }
  .main{position:relative;z-index:5;padding:28px 32px;max-width:1400px;margin:0 auto}
  .dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{
    background:var(--glass);backdrop-filter:blur(20px);
    border:1px solid var(--border-glass);border-radius:16px;padding:20px;
    position:relative;overflow:hidden;transition:all 0.3s;cursor:default
  }
  .stat-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent,var(--neon)),transparent);
    opacity:0.8
  }
  .stat-card::after{
    content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(circle,var(--glow,rgba(0,245,255,0.04)) 0%,transparent 60%);
    pointer-events:none
  }
  .stat-card:hover{transform:translateY(-4px);border-color:rgba(0,245,255,0.25);box-shadow:0 0 30px var(--glow,rgba(0,245,255,0.1))}
  .stat-icon{font-size:24px;margin-bottom:12px}
  .stat-val{font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px}
  .stat-label{font-size:12px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
  .stat-card.c1{--accent:var(--neon);--glow:rgba(0,245,255,0.08)}
  .stat-card.c2{--accent:var(--neon2);--glow:rgba(191,0,255,0.08)}
  .stat-card.c3{--accent:var(--neon3);--glow:rgba(0,255,136,0.08)}
  .stat-card.c4{--accent:var(--neon4);--glow:rgba(255,107,53,0.08)}
  .controls-bar{
    display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap
  }
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:0.4}
  input.search{
    width:100%;padding:11px 14px 11px 42px;
    background:var(--glass);backdrop-filter:blur(10px);
    border:1px solid var(--border-glass);border-radius:12px;
    color:var(--text);font-size:14px;outline:none;transition:all 0.3s
  }
  input.search:focus{border-color:var(--border-neon);box-shadow:0 0 20px rgba(0,245,255,0.1)}
  input.search::placeholder{color:var(--text2)}
  select.filter{
    padding:11px 16px;background:var(--glass);backdrop-filter:blur(10px);
    border:1px solid var(--border-glass);border-radius:12px;
    color:var(--text);font-size:14px;outline:none;cursor:pointer;transition:all 0.3s
  }
  select.filter:focus{border-color:var(--border-neon)}
  select.filter option{background:#0d0d2b;color:var(--text)}
  .btn{
    padding:11px 22px;border-radius:12px;border:none;cursor:pointer;
    font-size:14px;font-weight:600;letter-spacing:0.5px;transition:all 0.25s;
    display:flex;align-items:center;gap:8px;white-space:nowrap
  }
  .btn-primary{
    background:linear-gradient(135deg,rgba(0,245,255,0.2),rgba(0,245,255,0.05));
    border:1px solid rgba(0,245,255,0.5);color:var(--neon);
    box-shadow:0 0 20px rgba(0,245,255,0.15),inset 0 1px 0 rgba(0,245,255,0.1)
  }
  .btn-primary:hover{background:linear-gradient(135deg,rgba(0,245,255,0.3),rgba(0,245,255,0.1));box-shadow:0 0 35px rgba(0,245,255,0.3);transform:translateY(-1px)}
  .btn-danger{
    background:linear-gradient(135deg,rgba(255,70,70,0.2),rgba(255,70,70,0.05));
    border:1px solid rgba(255,70,70,0.5);color:#ff4646;
    box-shadow:0 0 15px rgba(255,70,70,0.1)
  }
  .btn-danger:hover{box-shadow:0 0 25px rgba(255,70,70,0.25);transform:translateY(-1px)}
  .btn-edit{
    background:linear-gradient(135deg,rgba(191,0,255,0.2),rgba(191,0,255,0.05));
    border:1px solid rgba(191,0,255,0.5);color:var(--neon2);
    box-shadow:0 0 15px rgba(191,0,255,0.1)
  }
  .btn-edit:hover{box-shadow:0 0 25px rgba(191,0,255,0.25);transform:translateY(-1px)}
  .btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
  .view-toggle{display:flex;background:var(--glass);border:1px solid var(--border-glass);border-radius:12px;overflow:hidden}
  .view-btn{padding:10px 16px;background:none;border:none;color:var(--text2);cursor:pointer;transition:all 0.2s;font-size:16px}
  .view-btn.active{background:rgba(0,245,255,0.1);color:var(--neon)}
  .table-wrap{
    background:var(--glass);backdrop-filter:blur(20px);
    border:1px solid var(--border-glass);border-radius:20px;overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.3)
  }
  table{width:100%;border-collapse:collapse}
  thead tr{background:rgba(0,245,255,0.05);border-bottom:1px solid var(--border-glass)}
  th{padding:16px 20px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--neon);font-weight:600}
  td{padding:16px 20px;font-size:14px;color:var(--text3);border-bottom:1px solid rgba(255,255,255,0.04)}
  tr:last-child td{border-bottom:none}
  tr.product-row{transition:all 0.2s;cursor:default}
  tr.product-row:hover{background:var(--glass2)}
  .product-img-cell{width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--border-glass);background:rgba(255,255,255,0.05)}
  .product-img-cell.placeholder{display:flex;align-items:center;justify-content:center;font-size:22px}
  .status-badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px
  }
  .status-ok{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--neon3)}
  .status-low{background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);color:var(--neon4)}
  .status-out{background:rgba(255,70,70,0.1);border:1px solid rgba(255,70,70,0.3);color:#ff4646}
  .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
  .product-card{
    background:var(--glass);backdrop-filter:blur(20px);
    border:1px solid var(--border-glass);border-radius:20px;overflow:hidden;
    transition:all 0.3s;position:relative
  }
  .product-card:hover{transform:translateY(-6px);border-color:rgba(0,245,255,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 30px rgba(0,245,255,0.08)}
  .card-img{width:100%;height:150px;object-fit:cover;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:50px}
  .card-body{padding:18px}
  .card-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
  .card-cat{font-size:12px;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
  .card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .card-price{font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--neon3),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .card-actions{display:flex;gap:8px;margin-top:14px}
  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,5,16,0.85);
    backdrop-filter:blur(10px);z-index:1000;
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:all 0.3s
  }
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{
    background:linear-gradient(135deg,rgba(13,13,43,0.95),rgba(10,10,30,0.95));
    border:1px solid var(--border-glass);border-radius:24px;padding:32px;
    width:90%;max-width:520px;max-height:90vh;overflow-y:auto;
    box-shadow:0 0 60px rgba(0,245,255,0.1),0 30px 80px rgba(0,0,0,0.5);
    transform:scale(0.95) translateY(20px);transition:all 0.3s;
    position:relative
  }
  .modal-overlay.open .modal{transform:scale(1) translateY(0)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .modal-title{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;transition:all 0.2s;line-height:1}
  .modal-close:hover{color:var(--text);transform:rotate(90deg)}
  .form-group{margin-bottom:18px}
  .form-label{display:block;font-size:12px;color:var(--neon);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .form-input{
    width:100%;padding:12px 16px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border-glass);border-radius:12px;
    color:var(--text);font-size:14px;outline:none;transition:all 0.3s;
    font-family:inherit
  }
  .form-input:focus{border-color:var(--border-neon);box-shadow:0 0 20px rgba(0,245,255,0.08)}
  .form-input::placeholder{color:var(--text2)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .img-preview-wrap{
    border:2px dashed var(--border-glass);border-radius:14px;
    padding:20px;text-align:center;margin-bottom:18px;cursor:pointer;transition:all 0.3s
  }
  .img-preview-wrap:hover{border-color:var(--border-neon);background:rgba(0,245,255,0.03)}
  .img-preview{max-height:120px;border-radius:10px;margin-bottom:10px;display:none}
  .img-preview.show{display:block;margin:0 auto 10px}
  .img-emoji-preview{font-size:50px;margin-bottom:10px;display:block}
  .form-actions{display:flex;gap:12px;margin-top:28px}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
  .empty-icon{font-size:60px;margin-bottom:16px;opacity:0.4}
  .alert-banner{
    background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.3);
    border-radius:14px;padding:14px 20px;margin-bottom:20px;
    display:flex;align-items:center;gap:12px;font-size:13px;color:var(--neon4);
    box-shadow:0 0 20px rgba(255,107,53,0.08)
  }
  .confirm-modal{
    background:linear-gradient(135deg,rgba(13,13,43,0.98),rgba(10,10,30,0.98));
    border:1px solid rgba(255,70,70,0.3);border-radius:20px;padding:28px;
    width:90%;max-width:360px;text-align:center;
    box-shadow:0 0 40px rgba(255,70,70,0.15)
  }
  .confirm-modal h3{font-size:18px;font-weight:700;margin-bottom:10px;color:var(--text)}
  .confirm-modal p{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
  .confirm-actions{display:flex;gap:12px;justify-content:center}
  .category-pill{
    display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
    background:rgba(191,0,255,0.1);border:1px solid rgba(191,0,255,0.25);color:var(--neon2)
  }
  .glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--neon),var(--neon2),transparent);margin:20px 0;opacity:0.3}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.2);border-radius:3px}

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — Controle de Estoque</title>
<style>
  /* Ajustes para Celular */
@media (max-width: 768px) {
  .dashboard { 
    grid-template-columns: repeat(2, 1fr); /* 2 colunas nos cards de status */
    gap: 10px;
  }
  .main { padding: 15px; }
  .table-wrap { overflow-x: auto; } /* Permite deslizar a tabela pro lado */
  .btn span { display: none; } /* Esconde o ícone nos botões para economizar espaço */
}
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --neon:#00f5ff;--neon2:#bf00ff;--neon3:#00ff88;--neon4:#ff6b35;
    --glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);
    --border-glass:rgba(255,255,255,0.12);--border-neon:rgba(0,245,255,0.4);
    --bg:#050510;--bg2:#0a0a1e;--bg3:#0d0d2b;
    --text:#e8eeff;--text2:#8892b0;--text3:#ccd6f6
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(0,245,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(191,0,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 50% 80%,rgba(0,255,136,0.04) 0%,transparent 60%)
  }

</style>

<div class="particles" id="particles"></div>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <div class="logo-text">STOCKFLOW</div>
      <div class="logo-sub">CONTROLE DE ESTOQUE</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="badge" id="header-badge">0 PRODUTOS</div>
    <button class="btn btn-primary" onclick="openModal()">
      <span>✦</span> Novo Produto
    </button>
  </div>
</header>

<div class="main">
  <div class="alert-banner" id="alert-banner" style="display:none">
    <span>⚠</span>
    <span id="alert-text"></span>
  </div>

  <div class="dashboard">
    <div class="stat-card c1">
      <div class="stat-icon">📦</div>
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">Total de Produtos</div>
    </div>
    <div class="stat-card c2">
      <div class="stat-icon">💎</div>
      <div class="stat-val" id="stat-valor">R$ 0</div>
      <div class="stat-label">Valor em Estoque</div>
    </div>
    <div class="stat-card c3">
      <div class="stat-icon">✅</div>
      <div class="stat-val" id="stat-ok">0</div>
      <div class="stat-label">Em Estoque</div>
    </div>
    <div class="stat-card c4">
      <div class="stat-icon">⚡</div>
      <div class="stat-val" id="stat-baixo">0</div>
      <div class="stat-label">Estoque Baixo</div>
    </div>
  </div>

  <div class="controls-bar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search" type="text" id="search-input" placeholder="Buscar produto..." oninput="renderProducts()">
    </div>
    <select class="filter" id="cat-filter" onchange="renderProducts()">
      <option value="">Todas as Categorias</option>
    </select>
    <select class="filter" id="status-filter" onchange="renderProducts()">
      <option value="">Todos os Status</option>
      <option value="ok">Em Estoque</option>
      <option value="low">Estoque Baixo</option>
      <option value="out">Sem Estoque</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="view-table" onclick="setView('table')" title="Tabela">☰</button>
      <button class="view-btn" id="view-cards" onclick="setView('cards')" title="Cards">⊞</button>
    </div>
  </div>

  <div id="products-container"></div>
</div>

<!-- Modal Produto -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Novo Produto</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="img-preview-wrap" onclick="document.getElementById('img-upload').click()">
      <img class="img-preview" id="img-preview" src="" alt="">
      <span class="img-emoji-preview" id="img-emoji">📸</span>
      <div style="font-size:13px;color:var(--text2)">Clique para adicionar imagem</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">ou cole uma URL abaixo</div>
      <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="handleImgUpload(event)">
    </div>
    <div class="form-group">
      <label class="form-label">URL da Imagem</label>
      <input class="form-input" type="text" id="form-img-url" placeholder="https://..." oninput="handleImgUrl()">
    </div>
    <div class="glow-line"></div>
    <div class="form-group">
      <label class="form-label">Nome do Produto *</label>
      <input class="form-input" type="text" id="form-nome" placeholder="Ex: Notebook Dell Inspiron">
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <input class="form-input" type="text" id="form-cat" placeholder="Ex: Eletrônicos, Roupas...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quantidade *</label>
        <input class="form-input" type="number" id="form-qty" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Qtd. Mínima</label>
        <input class="form-input" type="number" id="form-min" placeholder="5" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Preço (R$)</label>
        <input class="form-input" type="number" id="form-preco" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Código / SKU</label>
        <input class="form-input" type="text" id="form-sku" placeholder="SKU-001">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fornecedor</label>
      <input class="form-input" type="text" id="form-fornecedor" placeholder="Nome do fornecedor">
    </div>
    <div class="form-group">
      <label class="form-label">Localização</label>
      <input class="form-input" type="text" id="form-local" placeholder="Ex: Prateleira A3, Galpão 2...">
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea class="form-input" id="form-obs" placeholder="Notas adicionais..." rows="3" style="resize:vertical"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="saveProduct()">✦ Salvar Produto</button>
      <button class="btn" style="background:var(--glass);border:1px solid var(--border-glass);color:var(--text2)" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal Confirmação -->
<div class="modal-overlay" id="confirm-modal">
  <div class="confirm-modal">
    <div style="font-size:48px;margin-bottom:16px">🗑</div>
    <h3>Excluir Produto?</h3>
    <p>Esta ação não pode ser desfeita.<br>O produto será removido permanentemente do estoque.</p>
    <div class="confirm-actions">
      <button class="btn btn-danger" onclick="confirmDelete()">Excluir</button>
      <button class="btn" style="background:var(--glass);border:1px solid var(--border-glass);color:var(--text2)" onclick="closeConfirm()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('stockflow_v2')||'[]');
let editId = null;
let deleteId = null;
let viewMode = 'table';
let imgData = null;

function genId(){return Date.now()+'_'+Math.random().toString(36).slice(2)}

function getStatus(p){
  if(p.qty<=0) return 'out';
  const min = p.min||5;
  if(p.qty<=min) return 'low';
  return 'ok';
}

function statusBadge(p){
  const s=getStatus(p);
  if(s==='ok') return `<span class="status-badge status-ok"><span class="status-dot"></span>Em Estoque</span>`;
  if(s==='low') return `<span class="status-badge status-low"><span class="status-dot"></span>Estoque Baixo</span>`;
  return `<span class="status-badge status-out"><span class="status-dot"></span>Sem Estoque</span>`;
}

function imgEl(p,size='52px'){
  if(p.img) return `<img src="${p.img}" style="width:${size};height:${size};object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.1)">`;
  const emojis={'Eletrônicos':'💻','Roupas':'👕','Alimentos':'🍎','Bebidas':'🥤','Ferramentas':'🔧','Livros':'📚','Brinquedos':'🧸'};
  const e=emojis[p.cat]||'📦';
  return `<div class="product-img-cell placeholder" style="width:${size};height:${size}">${e}</div>`;
}

function fmtPrice(v){return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}

function updateStats(){
  const total=products.length;
  const valor=products.reduce((a,p)=>a+(p.qty||0)*(p.preco||0),0);
  const ok=products.filter(p=>getStatus(p)==='ok').length;
  const baixo=products.filter(p=>getStatus(p)==='low').length;
  const sem=products.filter(p=>getStatus(p)==='out').length;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-valor').textContent='R$ '+(valor).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  document.getElementById('stat-ok').textContent=ok;
  document.getElementById('stat-baixo').textContent=baixo+sem;
  document.getElementById('header-badge').textContent=total+' PRODUTO'+(total===1?'':'S');
  const ab=document.getElementById('alert-banner');
  const alerts=products.filter(p=>getStatus(p)!=='ok');
  if(alerts.length>0){
    ab.style.display='flex';
    document.getElementById('alert-text').textContent=
      `⚠ ${alerts.length} produto${alerts.length>1?'s':''}  com estoque baixo ou zerado: ${alerts.slice(0,3).map(p=>p.nome).join(', ')}${alerts.length>3?'...':''}`;
  } else { ab.style.display='none' }
}

function updateCatFilter(){
  const cats=[...new Set(products.map(p=>p.cat).filter(Boolean))];
  const sel=document.getElementById('cat-filter');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as Categorias</option>';
  cats.forEach(c=>{ const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o) });
  sel.value=cur;
}

function getFiltered(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const st=document.getElementById('status-filter').value;
  return products.filter(p=>{
    const nameMatch=p.nome.toLowerCase().includes(q)||
      (p.sku&&p.sku.toLowerCase().includes(q))||
      (p.fornecedor&&p.fornecedor.toLowerCase().includes(q));
    const catMatch=!cat||p.cat===cat;
    const stMatch=!st||getStatus(p)===st;
    return nameMatch&&catMatch&&stMatch;
  });
}

function renderProducts(){
  updateStats();updateCatFilter();
  const list=getFiltered();
  const cont=document.getElementById('products-container');
  if(list.length===0){
    cont.innerHTML=`<div class="empty-state"><div class="empty-icon">🚀</div><div style="font-size:18px;color:var(--text3);margin-bottom:8px">Nenhum produto encontrado</div><div style="font-size:14px">Adicione seu primeiro produto clicando em "Novo Produto"</div></div>`;
    return;
  }
  if(viewMode==='table'){
    cont.innerHTML=`<div class="table-wrap"><table>
      <thead><tr>
        <th style="width:60px">IMG</th>
        <th>Produto</th>
        <th>Categoria</th>
        <th>SKU</th>
        <th>Qtd.</th>
        <th>Preço Unit.</th>
        <th>Total</th>
        <th>Status</th>
        <th>Local</th>
        <th style="width:120px">Ações</th>
      </tr></thead>
      <tbody>${list.map(p=>`
      <tr class="product-row">
        <td>${imgEl(p,'48px')}</td>
        <td>
          <div style="font-weight:600;color:var(--text);margin-bottom:2px">${p.nome}</div>
          ${p.fornecedor?`<div style="font-size:11px;color:var(--text2)">${p.fornecedor}</div>`:''}
        </td>
        <td>${p.cat?`<span class="category-pill">${p.cat}</span>`:'-'}</td>
        <td style="font-family:monospace;font-size:12px;color:var(--text2)">${p.sku||'-'}</td>
        <td>
          <span style="font-size:16px;font-weight:700;color:${getStatus(p)==='ok'?'var(--neon3)':getStatus(p)==='low'?'var(--neon4)':'#ff4646'}">${p.qty||0}</span>
          ${p.min?`<span style="font-size:11px;color:var(--text2);margin-left:4px">/ mín ${p.min}</span>`:''}
        </td>
        <td style="font-weight:600;color:var(--neon3)">${fmtPrice(p.preco)}</td>
        <td style="font-weight:600">${fmtPrice((p.qty||0)*(p.preco||0))}</td>
        <td>${statusBadge(p)}</td>
        <td style="font-size:12px;color:var(--text2)">${p.local||'-'}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-edit btn-sm" onclick="openEdit('${p.id}')">✏</button>
            <button class="btn btn-danger btn-sm" onclick="openConfirm('${p.id}')">🗑</button>
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    cont.innerHTML=`<div class="card-grid">${list.map(p=>`
    <div class="product-card">
      <div class="card-img">${p.img?`<img src="${p.img}" style="width:100%;height:100%;object-fit:cover">`:
        (()=>{const emojis={'Eletrônicos':'💻','Roupas':'👕','Alimentos':'🍎','Bebidas':'🥤','Ferramentas':'🔧','Livros':'📚','Brinquedos':'🧸'};return emojis[p.cat]||'📦'})()
      }</div>
      <div class="card-body">
        <div class="card-name">${p.nome}</div>
        <div class="card-cat">${p.cat||'Sem categoria'}${p.sku?` · ${p.sku}`:''}</div>
        <div class="card-row">
          <div class="card-price">${fmtPrice(p.preco)}</div>
          ${statusBadge(p)}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px">
          <span>Qtd: <b style="color:var(--text)">${p.qty||0}</b></span>
          <span>Total: <b style="color:var(--neon3)">${fmtPrice((p.qty||0)*(p.preco||0))}</b></span>
        </div>
        ${p.local?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">📍 ${p.local}</div>`:''}
        ${p.obs?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px;border-top:1px solid rgba(255,255,255,0.05);padding-top:8px">${p.obs}</div>`:''}
        <div class="card-actions">
          <button class="btn btn-edit btn-sm" style="flex:1;justify-content:center" onclick="openEdit('${p.id}')">✏ Editar</button>
          <button class="btn btn-danger btn-sm" onclick="openConfirm('${p.id}')">🗑</button>
        </div>
      </div>
    </div>`).join('')}</div>`;
  }
}

function setView(v){
  viewMode=v;
  document.getElementById('view-table').classList.toggle('active',v==='table');
  document.getElementById('view-cards').classList.toggle('active',v==='cards');
  renderProducts();
}

function openModal(id=null){
  editId=id;imgData=null;
  const p=id?products.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=id?'Editar Produto':'Novo Produto';
  document.getElementById('form-nome').value=p?.nome||'';
  document.getElementById('form-cat').value=p?.cat||'';
  document.getElementById('form-qty').value=p?.qty??'';
  document.getElementById('form-min').value=p?.min||'';
  document.getElementById('form-preco').value=p?.preco||'';
  document.getElementById('form-sku').value=p?.sku||'';
  document.getElementById('form-fornecedor').value=p?.fornecedor||'';
  document.getElementById('form-local').value=p?.local||'';
  document.getElementById('form-obs').value=p?.obs||'';
  document.getElementById('form-img-url').value=p?.imgUrl||'';
  const prev=document.getElementById('img-preview');
  const emoji=document.getElementById('img-emoji');
  if(p?.img){prev.src=p.img;prev.classList.add('show');emoji.style.display='none'}
  else{prev.classList.remove('show');prev.src='';emoji.style.display='block'}
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;imgData=null}

function openEdit(id){openModal(id)}

function openConfirm(id){deleteId=id;document.getElementById('confirm-modal').classList.add('open')}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');deleteId=null}
function confirmDelete(){
  if(!deleteId) return;
  products=products.filter(p=>p.id!==deleteId);
  save();closeConfirm();renderProducts();
}

function handleImgUpload(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    imgData=ev.target.result;
    document.getElementById('img-preview').src=imgData;
    document.getElementById('img-preview').classList.add('show');
    document.getElementById('img-emoji').style.display='none';
  };
  reader.readAsDataURL(file);
}

function handleImgUrl(){
  const url=document.getElementById('form-img-url').value;
  if(url){
    imgData=url;
    document.getElementById('img-preview').src=url;
    document.getElementById('img-preview').classList.add('show');
    document.getElementById('img-emoji').style.display='none';
  } else {
    imgData=null;
    document.getElementById('img-preview').classList.remove('show');
    document.getElementById('img-emoji').style.display='block';
  }
}

function saveProduct(){
  const nome=document.getElementById('form-nome').value.trim();
  if(!nome){document.getElementById('form-nome').focus();document.getElementById('form-nome').style.borderColor='rgba(255,70,70,0.5)';setTimeout(()=>{document.getElementById('form-nome').style.borderColor=''},1500);return}
  const product={
    id:editId||genId(),
    nome,
    cat:document.getElementById('form-cat').value.trim(),
    qty:parseFloat(document.getElementById('form-qty').value)||0,
    min:parseFloat(document.getElementById('form-min').value)||5,
    preco:parseFloat(document.getElementById('form-preco').value)||0,
    sku:document.getElementById('form-sku').value.trim(),
    fornecedor:document.getElementById('form-fornecedor').value.trim(),
    local:document.getElementById('form-local').value.trim(),
    obs:document.getElementById('form-obs').value.trim(),
    img:imgData||(editId?products.find(p=>p.id===editId)?.img:null)||null,
    imgUrl:document.getElementById('form-img-url').value.trim(),
    updatedAt:new Date().toLocaleDateString('pt-BR')
  };
  if(editId){
    const idx=products.findIndex(p=>p.id===editId);
    products[idx]=product;
  } else { products.unshift(product) }
  save();closeModal();renderProducts();
}

function save(){localStorage.setItem('stockflow_v2',JSON.stringify(products))}

function createParticles(){
  const cont=document.getElementById('particles');
  for(let i=0;i<20;i++){
    const d=document.createElement('div');
    d.className='particle';
    const colors=['rgba(0,245,255,0.6)','rgba(191,0,255,0.5)','rgba(0,255,136,0.5)'];
    d.style.cssText=`
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:-${Math.random()*20}s;
      --dx:${(Math.random()-0.5)*4};
      box-shadow:0 0 6px currentColor;
      width:${Math.random()>0.7?3:2}px;
      height:${Math.random()>0.7?3:2}px;
    `;
    cont.appendChild(d);
  }
}

createParticles();renderProducts();
</script>
</html>
